<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Work Planner</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
:root {
  --bg:#f5f7fb; --card:#fff; --text:#1f2937;
  --primary:#4f46e5; --accent:#22c55e; --border:#e5e7eb;
}
body.dark {
  --bg:#0f172a; --card:#1e293b; --text:#f1f5f9;
  --primary:#6366f1; --accent:#4ade80; --border:#334155;
}
body {
  margin:0; font-family:Segoe UI; background:var(--bg); color:var(--text);
}
.container { max-width:600px; margin:auto; padding:20px; }

.header { display:flex; justify-content:space-between; align-items:center; }
.toggle { cursor:pointer; }

.card {
  background:var(--card);
  padding:20px; margin-top:20px;
  border-radius:14px;
  border:1px solid var(--border);
}

input, button {
  width:100%; padding:10px; margin-top:10px;
  border-radius:8px; border:1px solid var(--border);
}

button {
  background:var(--primary); color:#fff; border:none; cursor:pointer;
}
button.secondary { background:var(--accent); }

.result-item {
  display:flex; justify-content:space-between; margin-top:10px;
}

.timeline-bar {
  height:20px; background:var(--border); border-radius:10px;
}
.timeline-progress {
  height:100%; width:0%; background:linear-gradient(90deg,var(--primary),var(--accent));
}

.hidden { display:none; }
</style>
</head>

<body>

<div class="container">

<div class="header">
  <h2>⏱ Work Planner</h2>
  <div class="toggle" onclick="toggleDarkMode()">🌙</div>
</div>

<!-- INPUT -->
<div class="card">
  <input id="workHours" type="number" step="0.1" placeholder="Work hours (e.g. 7.5)">
  <input id="breakTime" type="number" step="0.1" placeholder="Break (e.g. 0.5)">
  <button onclick="setPlan()">Continue</button>
</div>

<!-- CLOCK -->
<div id="clockSection" class="card hidden">
  <input type="time" id="clockIn">
  <button onclick="generateSchedule()">Generate</button>
</div>

<!-- RESULT -->
<div id="result" class="card hidden">
  <div class="result-item"><span>Break</span><b id="breakOut"></b></div>
  <div class="result-item"><span>Back</span><b id="breakIn"></b></div>
  <div class="result-item"><span>Finish</span><b id="finish"></b></div>

  <button class="secondary" onclick="saveSession()">Save</button>

  <div class="timeline-bar">
    <div id="progress" class="timeline-progress"></div>
  </div>
</div>

<!-- ANALYTICS -->
<div class="card">
  <h3>📊 Analytics</h3>
  <button onclick="loadAnalytics()">Load Analytics</button>
  <div id="analytics"></div>
  <canvas id="chart"></canvas>
</div>

<!-- HISTORY -->
<div class="card">
  <h3>📅 History</h3>
  <button onclick="loadSessions()">Load Sessions</button>
  <div id="sessions"></div>
</div>

</div>

<script>
let plan={}, last={};

// -------- UTILS --------
function decToMin(d){
  const h=Math.floor(d);
  return h*60 + Math.round((d-h)*60);
}
function timeToMin(t){
  const [h,m]=t.split(":").map(Number);
  return h*60+m;
}

// -------- PLAN --------
function setPlan(){
  plan.work=decToMin(parseFloat(workHours.value));
  plan.break=decToMin(parseFloat(breakTime.value));
  document.getElementById("clockSection").classList.remove("hidden");
}

// -------- GENERATE --------
async function generateSchedule(){
  const res=await fetch("/generate-schedule",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      clock_in:clockIn.value,
      work_minutes:plan.work,
      break_minutes:plan.break
    })
  });
  const d=await res.json();

  breakOut.innerText=d.break_start;
  breakIn.innerText=d.break_end;
  finish.innerText=d.finish;

  last={
    start_time:clockIn.value,
    break_start:d.break_start,
    break_end:d.break_end,
    end_time:d.finish,
    work_minutes:plan.work,
    break_minutes:plan.break
  };

  document.getElementById("result").classList.remove("hidden");
  startTimeline(clockIn.value,d.finish);
}

// -------- SAVE --------
async function saveSession(){
  await fetch("/save-session",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify(last)
  });
  alert("Saved!");
}

// -------- ANALYTICS --------
async function loadAnalytics(){
  const res=await fetch("/analytics");
  const d=await res.json();

  analytics.innerHTML=`
    Days: ${d.total_days}<br>
    Total Hours: ${d.total_work_hours}<br>
    Avg: ${d.avg_work_hours}
  `;

  loadChart();
}

async function loadChart(){
  const res=await fetch("/analytics/daily");
  const d=await res.json();

  new Chart(chart,{
    type:"line",
    data:{
      labels:d.map(x=>x.date),
      datasets:[{label:"Work Hours",data:d.map(x=>x.work_hours)}]
    }
  });
}

// -------- HISTORY --------
async function loadSessions(){
  const res=await fetch("/sessions");
  const d=await res.json();

  sessions.innerHTML=d.map(s=>
    `<div>${s.date} | ${s.start_time} → ${s.end_time}</div>`
  ).join("");
}

// -------- TIMELINE --------
function startTimeline(start,end){
  const s=timeToMin(start);
  const e=timeToMin(end);

  function update(){
    const now=new Date();
    const c=now.getHours()*60+now.getMinutes();
    const p=Math.min(Math.max((c-s)/(e-s),0),1);
    progress.style.width=(p*100)+"%";
  }

  update();
  setInterval(update,60000);
}

// -------- DARK MODE --------
function toggleDarkMode(){
  document.body.classList.toggle("dark");
  localStorage.setItem("dark",document.body.classList.contains("dark"));
}
if(localStorage.getItem("dark")==="true"){
  document.body.classList.add("dark");
}
</script>

</body>
</html>
